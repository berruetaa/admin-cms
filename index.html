<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin CMS</title>
    <link rel="stylesheet" href="styles/main.css">
    <!-- EasyMDE — Markdown editor -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
    <style>
      /* Fit EasyMDE inside CMS modals */
      .EasyMDEContainer { display: flex; flex-direction: column; }
      .EasyMDEContainer .CodeMirror { min-height: 280px; border-radius: 0 0 4px 4px; }
      .editor-preview { background: var(--bg-secondary, #f8f9fa); padding: 1rem; }
      .autosave-banner { font-size: .78rem; color: var(--text-muted, #888); margin-bottom: .5rem; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
