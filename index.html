<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin CMS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>Admin CMS</h3>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="#/dashboard" class="active">Dashboard</a></li>
                    <li><a href="#/blog">Blog</a></li>
                    <li><a href="#/academico">Académico</a></li>
                    <li><a href="#/files">Archivos</a></li>
                    <li><a href="#/tools">Tools</a></li>
                    <li><a href="#/system">Sistema</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn danger" style="display: none;">Cerrar sesión</button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-layout" id="main-layout">
            <header class="topbar">
                <span id="user-info">Desconectado</span>
            </header>
            <div id="main-content" class="content">
                <!-- Routed content will be injected here -->
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
